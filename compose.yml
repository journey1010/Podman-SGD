services:
  db:
    image: dhi.io/postgres:16
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    
  payara:
    container_name: payara
    build:
      context: ./payara
      dockerfile: Containerfile
      args:
        - TIMEZONE=${TIMEZONE}
        - PAYARA_DIR=${PAYARA_DIR}
    ports:
      - "8080:8080"
      - "8181:8181"
      - "4848:4848"
    depends_on:
      - db
  web:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - payara
    
volumes:
  pgdata: